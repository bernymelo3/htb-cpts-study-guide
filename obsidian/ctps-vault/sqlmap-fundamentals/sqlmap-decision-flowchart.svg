<svg width="100%" viewBox="0 0 680 1340" xmlns="http://www.w3.org/2000/svg">
<title>SQLMap essentials decision flowchart</title>
<desc>A flowchart showing the complete SQLMap workflow from finding the injection point through protection bypasses to data extraction and OS exploitation.</desc>
<style>
  text { font-family: 'Helvetica Neue', Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 3 2; }

  .fill-gray { fill: #F1EFE8; stroke: #5F5E5A; }
  .fill-teal { fill: #E1F5EE; stroke: #0F6E56; }
  .fill-purple { fill: #EEEDFE; stroke: #534AB7; }
  .fill-coral { fill: #FAECE7; stroke: #993C1D; }
  .fill-amber { fill: #FAEEDA; stroke: #854F0B; }
  .fill-blue { fill: #E6F1FB; stroke: #185FA5; }
  .fill-pink { fill: #FBEAF0; stroke: #993556; }
  .fill-red { fill: #FCEBEB; stroke: #A32D2D; }

  .t-gray { fill: #2C2C2A; } .ts-gray { fill: #5F5E5A; }
  .t-teal { fill: #04342C; } .ts-teal { fill: #0F6E56; }
  .t-purple { fill: #26215C; } .ts-purple { fill: #534AB7; }
  .t-coral { fill: #4A1B0C; } .ts-coral { fill: #993C1D; }
  .t-amber { fill: #412402; } .ts-amber { fill: #854F0B; }
  .t-blue { fill: #042C53; } .ts-blue { fill: #185FA5; }
  .t-pink { fill: #4B1528; } .ts-pink { fill: #993556; }
  .t-red { fill: #501313; } .ts-red { fill: #A32D2D; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- PHASE 1: Find the injection point -->
<text class="th" x="340" y="30" text-anchor="middle">Phase 1 — Find the injection point</text>

<rect class="fill-gray" x="200" y="46" width="280" height="44" rx="8" stroke-width="0.5"/>
<text class="th t-gray" x="340" y="68" text-anchor="middle" dominant-baseline="central">Open target in browser + DevTools</text>

<line x1="340" y1="90" x2="340" y2="110" class="arr" marker-end="url(#arrow)"/>

<rect class="fill-teal" x="140" y="110" width="400" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-teal" x="340" y="130" text-anchor="middle" dominant-baseline="central">Where is the parameter?</text>
<text class="ts ts-teal" x="340" y="148" text-anchor="middle" dominant-baseline="central">GET url? POST form? Cookie? JSON body?</text>

<!-- Branches -->
<line x1="210" y1="166" x2="100" y2="200" class="arr" marker-end="url(#arrow)"/>
<line x1="290" y1="166" x2="260" y2="200" class="arr" marker-end="url(#arrow)"/>
<line x1="390" y1="166" x2="420" y2="200" class="arr" marker-end="url(#arrow)"/>
<line x1="470" y1="166" x2="570" y2="200" class="arr" marker-end="url(#arrow)"/>

<rect class="fill-purple" x="32" y="200" width="136" height="44" rx="8" stroke-width="0.5"/>
<text class="th t-purple" x="100" y="222" text-anchor="middle" dominant-baseline="central">GET</text>

<rect class="fill-purple" x="192" y="200" width="136" height="44" rx="8" stroke-width="0.5"/>
<text class="th t-purple" x="260" y="222" text-anchor="middle" dominant-baseline="central">POST form</text>

<rect class="fill-purple" x="352" y="200" width="136" height="44" rx="8" stroke-width="0.5"/>
<text class="th t-purple" x="420" y="222" text-anchor="middle" dominant-baseline="central">Cookie</text>

<rect class="fill-purple" x="512" y="200" width="136" height="44" rx="8" stroke-width="0.5"/>
<text class="th t-purple" x="580" y="222" text-anchor="middle" dominant-baseline="central">JSON body</text>

<text class="ts" x="100" y="262" text-anchor="middle">-u 'url?id=1'</text>
<text class="ts" x="260" y="262" text-anchor="middle">--data 'id=1'</text>
<text class="ts" x="420" y="262" text-anchor="middle">-H 'Cookie: id=*'</text>
<text class="ts" x="580" y="262" text-anchor="middle">-r request.req</text>

<!-- Converge -->
<line x1="100" y1="272" x2="100" y2="290" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="260" y1="272" x2="260" y2="290" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="420" y1="272" x2="420" y2="290" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="580" y1="272" x2="580" y2="290" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="100" y1="290" x2="580" y2="290" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="340" y1="290" x2="340" y2="310" class="arr" marker-end="url(#arrow)"/>

<!-- PHASE 2: Bypass protections -->
<text class="th" x="340" y="330" text-anchor="middle">Phase 2 — Bypass protections</text>

<rect class="fill-coral" x="140" y="346" width="400" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-coral" x="340" y="366" text-anchor="middle" dominant-baseline="central">What's blocking you?</text>
<text class="ts ts-coral" x="340" y="384" text-anchor="middle" dominant-baseline="central">Check for errors, empty responses, 403/406</text>

<line x1="340" y1="402" x2="340" y2="420" class="arr" marker-end="url(#arrow)"/>

<rect class="fill-amber" x="40" y="420" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-amber" x="105" y="440" text-anchor="middle" dominant-baseline="central">CSRF token</text>
<text class="ts ts-amber" x="105" y="458" text-anchor="middle" dominant-baseline="central">--csrf-token</text>

<rect class="fill-amber" x="185" y="420" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-amber" x="250" y="440" text-anchor="middle" dominant-baseline="central">Unique ID</text>
<text class="ts ts-amber" x="250" y="458" text-anchor="middle" dominant-baseline="central">--randomize</text>

<rect class="fill-amber" x="330" y="420" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-amber" x="395" y="440" text-anchor="middle" dominant-baseline="central">UA blacklist</text>
<text class="ts ts-amber" x="395" y="458" text-anchor="middle" dominant-baseline="central">--random-agent</text>

<rect class="fill-amber" x="475" y="420" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-amber" x="555" y="440" text-anchor="middle" dominant-baseline="central">WAF / filtering</text>
<text class="ts ts-amber" x="555" y="458" text-anchor="middle" dominant-baseline="central">--tamper=between</text>

<!-- Converge -->
<line x1="105" y1="476" x2="105" y2="500" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="250" y1="476" x2="250" y2="500" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="395" y1="476" x2="395" y2="500" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="555" y1="476" x2="555" y2="500" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="105" y1="500" x2="555" y2="500" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="340" y1="500" x2="340" y2="520" class="arr" marker-end="url(#arrow)"/>

<rect class="fill-coral" x="200" y="520" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-coral" x="340" y="540" text-anchor="middle" dominant-baseline="central">Still failing?</text>
<text class="ts ts-coral" x="340" y="558" text-anchor="middle" dominant-baseline="central">--level 5 --risk 3 --technique=t</text>

<line x1="340" y1="576" x2="340" y2="610" class="arr" marker-end="url(#arrow)"/>

<!-- PHASE 3: Recon -->
<text class="th" x="340" y="630" text-anchor="middle">Phase 3 — Recon the database</text>

<rect class="fill-blue" x="140" y="646" width="400" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-blue" x="340" y="666" text-anchor="middle" dominant-baseline="central">Basic info first</text>
<text class="ts ts-blue" x="340" y="684" text-anchor="middle" dominant-baseline="central">--banner --current-user --current-db --is-dba</text>

<line x1="340" y1="702" x2="340" y2="726" class="arr" marker-end="url(#arrow)"/>

<rect class="fill-blue" x="200" y="726" width="280" height="44" rx="8" stroke-width="0.5"/>
<text class="th t-blue" x="340" y="748" text-anchor="middle" dominant-baseline="central">--tables -D &lt;database&gt;</text>

<line x1="340" y1="770" x2="340" y2="794" class="arr" marker-end="url(#arrow)"/>

<!-- PHASE 4: Extract -->
<text class="th" x="340" y="814" text-anchor="middle">Phase 4 — Extract data</text>

<rect class="fill-teal" x="140" y="830" width="400" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-teal" x="340" y="850" text-anchor="middle" dominant-baseline="central">Dump target table</text>
<text class="ts ts-teal" x="340" y="868" text-anchor="middle" dominant-baseline="central">--dump -D &lt;db&gt; -T &lt;table&gt;</text>

<line x1="240" y1="886" x2="160" y2="920" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="886" x2="520" y2="920" class="arr" marker-end="url(#arrow)"/>

<rect class="fill-teal" x="60" y="920" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-teal" x="160" y="940" text-anchor="middle" dominant-baseline="central">Narrow it down</text>
<text class="ts ts-teal" x="160" y="958" text-anchor="middle" dominant-baseline="central">-C cols --start/--stop --where</text>

<rect class="fill-teal" x="420" y="920" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-teal" x="520" y="940" text-anchor="middle" dominant-baseline="central">Don't know the table?</text>
<text class="ts ts-teal" x="520" y="958" text-anchor="middle" dominant-baseline="central">--search -T/-C keyword</text>

<!-- Converge -->
<line x1="160" y1="976" x2="160" y2="1000" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="520" y1="976" x2="520" y2="1000" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="160" y1="1000" x2="520" y2="1000" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="340" y1="1000" x2="340" y2="1020" class="arr" marker-end="url(#arrow)"/>

<!-- PHASE 5: Passwords -->
<text class="th" x="340" y="1040" text-anchor="middle">Phase 5 — Crack passwords</text>

<rect class="fill-pink" x="80" y="1056" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-pink" x="200" y="1076" text-anchor="middle" dominant-baseline="central">App credentials</text>
<text class="ts ts-pink" x="200" y="1094" text-anchor="middle" dominant-baseline="central">--dump auto-cracks hashes</text>

<rect class="fill-pink" x="360" y="1056" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-pink" x="480" y="1076" text-anchor="middle" dominant-baseline="central">DB server creds</text>
<text class="ts ts-pink" x="480" y="1094" text-anchor="middle" dominant-baseline="central">--passwords</text>

<line x1="200" y1="1112" x2="200" y2="1130" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="480" y1="1112" x2="480" y2="1130" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="200" y1="1130" x2="480" y2="1130" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="340" y1="1130" x2="340" y2="1150" class="arr" marker-end="url(#arrow)"/>

<!-- PHASE 6: OS exploitation -->
<text class="th" x="340" y="1170" text-anchor="middle">Phase 6 — OS exploitation (if DBA)</text>

<rect class="fill-red" x="60" y="1186" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-red" x="150" y="1206" text-anchor="middle" dominant-baseline="central">Read files</text>
<text class="ts ts-red" x="150" y="1224" text-anchor="middle" dominant-baseline="central">--file-read</text>

<rect class="fill-red" x="250" y="1186" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-red" x="340" y="1206" text-anchor="middle" dominant-baseline="central">Write shell</text>
<text class="ts ts-red" x="340" y="1224" text-anchor="middle" dominant-baseline="central">--file-write/--file-dest</text>

<rect class="fill-red" x="440" y="1186" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th t-red" x="530" y="1206" text-anchor="middle" dominant-baseline="central">OS shell</text>
<text class="ts ts-red" x="530" y="1224" text-anchor="middle" dominant-baseline="central">--os-shell --technique=E</text>

<!-- Legend -->
<line x1="60" y1="1290" x2="620" y2="1290" stroke="#B4B2A9" stroke-width="0.5" opacity="0.3"/>
<text class="ts" x="340" y="1316" text-anchor="middle">SQLMap Essentials — Complete decision flowchart</text>
</svg>