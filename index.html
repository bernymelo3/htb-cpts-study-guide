<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPTS Knowledge Base</title>
<style>
  :root {
    --bg-dark: #0d1117;
    --bg-card: #161b22;
    --bg-sidebar: #0d1117;
    --bg-hover: #1c2333;
    --bg-active: #1f6feb22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #d2a8ff;
    --accent4: #f78166;
    --accent5: #ff7b72;
    --code-bg: #0d1117;
    --tag-bg: #1f6feb33;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg-dark); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 280px; min-width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; }
  #sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
  #sidebar-header h1 { font-size: 18px; color: var(--accent); font-weight: 700; letter-spacing: 1px; }
  #sidebar-header p { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  #search-box { margin: 12px 16px; padding: 8px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; width: calc(100% - 32px); }
  #search-box:focus { border-color: var(--accent); }
  #search-box::placeholder { color: var(--text-dim); }

  /* Category nav */
  #categories { padding: 8px 0; overflow-y: auto; flex: 1; }
  .cat-group { margin-bottom: 4px; }
  .cat-header { display: flex; align-items: center; padding: 8px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); cursor: pointer; user-select: none; }
  .cat-header:hover { color: var(--text); }
  .cat-header .count { margin-left: auto; background: var(--bg-hover); padding: 1px 7px; border-radius: 10px; font-size: 10px; }
  .cat-header .arrow { margin-right: 6px; transition: transform 0.15s; font-size: 10px; }
  .cat-header.collapsed .arrow { transform: rotate(-90deg); }
  .cat-items { }
  .cat-header.collapsed + .cat-items { display: none; }
  .note-link { display: block; padding: 6px 16px 6px 32px; font-size: 13px; color: var(--text-dim); cursor: pointer; text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 2px solid transparent; transition: all 0.1s; }
  .note-link:hover { background: var(--bg-hover); color: var(--text); }
  .note-link.active { background: var(--bg-active); color: var(--accent); border-left-color: var(--accent); }

  /* Stats bar */
  #stats { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-dim); }

  /* Main content */
  #main { flex: 1; overflow-y: auto; padding: 0; }
  #welcome, #note-view { max-width: 860px; margin: 0 auto; padding: 40px 48px; }

  /* Welcome */
  #welcome h2 { font-size: 28px; margin-bottom: 8px; }
  #welcome p { color: var(--text-dim); margin-bottom: 24px; font-size: 15px; }
  .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .stat-card .num { font-size: 28px; font-weight: 700; }
  .stat-card .label { font-size: 11px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .sc-scan .num { color: var(--accent); }
  .sc-foot .num { color: var(--accent2); }
  .sc-lab .num { color: var(--accent3); }
  .sc-exploit .num { color: var(--accent4); }
  .sc-privesc .num { color: var(--accent5); }
  .sc-tool .num { color: #79c0ff; }

  /* Tags overview */
  .tags-overview { margin-top: 16px; }
  .tags-overview h3 { font-size: 14px; color: var(--text-dim); margin-bottom: 10px; }
  .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag-pill { padding: 4px 10px; background: var(--tag-bg); border: 1px solid var(--accent)44; border-radius: 12px; font-size: 12px; color: var(--accent); cursor: pointer; transition: all 0.15s; }
  .tag-pill:hover { background: var(--accent); color: var(--bg-dark); }
  .tag-pill.active { background: var(--accent); color: var(--bg-dark); }

  /* Note view */
  #note-view { display: none; }
  #note-view .note-category { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 8px; }
  #note-view h2 { font-size: 24px; margin-bottom: 12px; line-height: 1.3; }
  #note-view .note-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  #note-view .note-tag { padding: 2px 8px; background: var(--tag-bg); border-radius: 10px; font-size: 11px; color: var(--accent); }
  #note-view .note-body { font-size: 14px; line-height: 1.7; }
  #note-view .note-body h1, #note-view .note-body h2, #note-view .note-body h3 { margin-top: 24px; margin-bottom: 8px; }
  #note-view .note-body h1 { font-size: 20px; }
  #note-view .note-body h2 { font-size: 18px; }
  #note-view .note-body h3 { font-size: 16px; color: var(--accent2); }
  #note-view .note-body p { margin-bottom: 12px; }
  #note-view .note-body ul, #note-view .note-body ol { margin-left: 20px; margin-bottom: 12px; }
  #note-view .note-body li { margin-bottom: 4px; }

  /* Command blocks */
  .cmd-block { position: relative; background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; margin: 12px 0; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; line-height: 1.6; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
  .cmd-block .copy-btn { position: absolute; top: 6px; right: 6px; background: var(--bg-hover); border: 1px solid var(--border); color: var(--text-dim); padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; opacity: 0; transition: opacity 0.15s; }
  .cmd-block:hover .copy-btn { opacity: 1; }
  .cmd-block .copy-btn:hover { color: var(--text); border-color: var(--accent); }
  .cmd-block .prompt { color: var(--accent2); user-select: none; }
  .cmd-block .comment { color: var(--text-dim); }

  /* Section divider */
  .section-divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  /* Description blocks */
  .desc-block { background: var(--bg-card); border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 0 6px 6px 0; margin: 12px 0; font-size: 13px; line-height: 1.6; }

  /* Inline code */
  .inline-code { background: var(--bg-hover); padding: 2px 6px; border-radius: 3px; font-family: 'SF Mono', monospace; font-size: 12px; color: var(--accent4); }

  /* Responsive */
  @media (max-width: 768px) {
    #sidebar { width: 100%; min-width: 100%; position: fixed; z-index: 10; transform: translateX(-100%); transition: transform 0.2s; }
    #sidebar.open { transform: translateX(0); }
    #welcome, #note-view { padding: 20px 16px; }
    .mobile-toggle { display: block !important; }
  }
  .mobile-toggle { display: none; position: fixed; top: 12px; left: 12px; z-index: 20; background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 16px; }

  /* Enhancements */
  .note-nav { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
  .nav-btn { padding: 6px 12px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .nav-btn:hover { color: var(--text); border-color: var(--accent); }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .nav-counter { font-size: 12px; color: var(--text-dim); }
  .breadcrumb { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; }
  .breadcrumb a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }
  .quick-access { margin: 12px 0; padding: 8px; background: var(--bg-card); border-left: 3px solid var(--accent); border-radius: 0 4px 4px 0; font-size: 12px; }
  .quick-access strong { color: var(--text); }
  .related-notes { margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
  .related-notes h3 { font-size: 14px; margin-bottom: 12px; color: var(--text-dim); }
  .related-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .related-item { padding: 8px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .related-item:hover { background: var(--bg-hover); border-color: var(--accent); }
  .export-menu { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 8px; }
  .export-btn { padding: 8px 12px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); border-radius: 4px; cursor: pointer; font-size: 11px; }
  .export-btn:hover { color: var(--text); border-color: var(--accent); }
  .theme-toggle { position: fixed; bottom: 20px; left: 20px; padding: 8px 12px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); border-radius: 4px; cursor: pointer; font-size: 14px; }
  .theme-toggle:hover { border-color: var(--accent); }
  body.light-theme { --bg-dark: #ffffff; --bg-card: #f6f8fa; --bg-sidebar: #f6f8fa; --bg-hover: #eaeef2; --bg-active: #1f6feb22; --border: #d0d7de; --text: #24292f; --text-dim: #57606a; --code-bg: #f6f8fa; }
  body.light-theme .cmd-block { border: 1px solid #d0d7de; }
</style>
</head>
<body>

<button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>
<div class="export-menu">
  <button class="export-btn" onclick="exportAsJSON()">JSON</button>
  <button class="export-btn" onclick="exportAsMarkdown()">Markdown</button>
</div>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>CPTS Notes</h1>
    <p>HTB Certified Penetration Testing Specialist</p>
  </div>
  <input type="text" id="search-box" placeholder="Search notes, commands, tags...">
  <div id="categories"></div>
  <div id="stats"></div>
</div>

<div id="main">
  <div id="welcome">
    <h2>CPTS Knowledge Base</h2>
    <p>Your organized penetration testing study notes from Hack The Box Academy.</p>
    <div class="stat-cards" id="stat-cards"></div>
    <div class="tags-overview">
      <h3>Filter by tag</h3>
      <div class="tag-cloud" id="tag-cloud"></div>
    </div>
  </div>
  <div id="note-view">
    <div class="breadcrumb" id="nv-breadcrumb"></div>
    <div class="note-nav">
      <button class="nav-btn" id="prev-btn" onclick="prevNote()">← Previous</button>
      <span class="nav-counter" id="nav-counter"></span>
      <button class="nav-btn" id="next-btn" onclick="nextNote()">Next →</button>
    </div>
    <div class="note-category" id="nv-category"></div>
    <h2 id="nv-title"></h2>
    <div class="note-tags" id="nv-tags"></div>
    <div class="quick-access" id="nv-quick" style="display:none;"></div>
    <div class="note-body" id="nv-body"></div>
    <div class="related-notes" id="nv-related" style="display:none;"></div>
  </div>
</div>

// --- App Logic ---
const categories = {};
const allTags = {};

NOTES.forEach(n => {
  if (!categories[n.category]) categories[n.category] = [];
  categories[n.category].push(n);
  n.tags.forEach(t => { allTags[t] = (allTags[t] || 0) + 1; });
});

const catColors = {
  "Scanning & Enumeration": "var(--accent)",
  "Footprinting": "var(--accent2)",
  "Labs & Walkthroughs": "var(--accent3)",
  "Exploitation & Active Directory": "var(--accent4)",
  "Privilege Escalation": "var(--accent5)",
  "Tools & Techniques": "#79c0ff"
};
const catClasses = {
  "Scanning & Enumeration": "sc-scan",
  "Footprinting": "sc-foot",
  "Labs & Walkthroughs": "sc-lab",
  "Exploitation & Active Directory": "sc-exploit",
  "Privilege Escalation": "sc-privesc",
  "Tools & Techniques": "sc-tool"
};

let activeTag = null;
let activeNoteId = null;
let filteredNotes = [...NOTES];

function renderSidebar(filter = "") {
  const container = document.getElementById("categories");
  container.innerHTML = "";
  const lf = filter.toLowerCase();

  // Update filteredNotes for nav buttons
  filteredNotes = NOTES.filter(n => {
    if (activeTag && !n.tags.includes(activeTag)) return false;
    if (!lf) return true;
    return n.title.toLowerCase().includes(lf) ||
           n.description.toLowerCase().includes(lf) ||
           n.commands.some(c => c.toLowerCase().includes(lf)) ||
           n.tags.some(t => t.toLowerCase().includes(lf));
  });

  Object.keys(categories).forEach(cat => {
    let notes = categories[cat].filter(n => {
      if (activeTag && !n.tags.includes(activeTag)) return false;
      if (!lf) return true;
      return n.title.toLowerCase().includes(lf) ||
             n.description.toLowerCase().includes(lf) ||
             n.commands.some(c => c.toLowerCase().includes(lf)) ||
             n.tags.some(t => t.toLowerCase().includes(lf));
    });
    if (notes.length === 0) return;

    const group = document.createElement("div");
    group.className = "cat-group";

    const header = document.createElement("div");
    header.className = "cat-header";
    header.style.color = catColors[cat] || "var(--text-dim)";
    header.innerHTML = `<span class="arrow">&#9660;</span>${cat}<span class="count">${notes.length}</span>`;
    header.onclick = () => header.classList.toggle("collapsed");
    group.appendChild(header);

    const items = document.createElement("div");
    items.className = "cat-items";
    notes.forEach(n => {
      const link = document.createElement("a");
      link.className = "note-link" + (n.id === activeNoteId ? " active" : "");
      link.textContent = n.title;
      link.onclick = () => showNote(n.id);
      items.appendChild(link);
    });
    group.appendChild(items);
    container.appendChild(group);
  });

  document.getElementById("stats").textContent = `${NOTES.length} notes across ${Object.keys(categories).length} categories`;
}

function renderStatCards() {
  const container = document.getElementById("stat-cards");
  container.innerHTML = "";
  Object.keys(categories).forEach(cat => {
    const card = document.createElement("div");
    card.className = "stat-card " + (catClasses[cat] || "");
    card.innerHTML = `<div class="num">${categories[cat].length}</div><div class="label">${cat}</div>`;
    card.style.cursor = "pointer";
    card.onclick = () => {
      document.getElementById("search-box").value = "";
      activeTag = null;
      renderTagCloud();
      renderSidebar();
      // scroll sidebar to this category
    };
    container.appendChild(card);
  });
}

function renderTagCloud() {
  const container = document.getElementById("tag-cloud");
  container.innerHTML = "";
  Object.keys(allTags).sort().forEach(tag => {
    const pill = document.createElement("span");
    pill.className = "tag-pill" + (tag === activeTag ? " active" : "");
    pill.textContent = `${tag} (${allTags[tag]})`;
    pill.onclick = () => {
      activeTag = activeTag === tag ? null : tag;
      renderTagCloud();
      renderSidebar(document.getElementById("search-box").value);
    };
    container.appendChild(pill);
  });
}

function showNote(id) {
  activeNoteId = id;
  const note = NOTES.find(n => n.id === id);
  if (!note) return;

  document.getElementById("welcome").style.display = "none";
  document.getElementById("note-view").style.display = "block";

  // Breadcrumb
  document.getElementById("nv-breadcrumb").innerHTML = `<a onclick="showWelcome()">CPTS Notes</a> / <strong>${note.category}</strong>`;

  document.getElementById("nv-category").textContent = note.category;
  document.getElementById("nv-category").style.color = catColors[note.category] || "var(--text-dim)";
  document.getElementById("nv-title").textContent = note.title;

  const tagsEl = document.getElementById("nv-tags");
  tagsEl.innerHTML = "";
  note.tags.forEach(t => {
    const s = document.createElement("span");
    s.className = "note-tag";
    s.textContent = t;
    tagsEl.appendChild(s);
  });

  // Quick access tip
  const quickEl = document.getElementById("nv-quick");
  if (note.commands.length > 0) {
    quickEl.innerHTML = `<strong>Tip:</strong> ${note.commands.length} commands available — hover and click copy to use them.`;
    quickEl.style.display = "block";
  } else {
    quickEl.style.display = "none";
  }

  let bodyHTML = "";
  if (note.description) {
    bodyHTML += `<div class="desc-block">${note.description}</div>`;
  }
  if (note.commands.length > 0) {
    bodyHTML += `<h3>Commands</h3>`;
    note.commands.forEach(cmd => {
      bodyHTML += `<div class="cmd-block"><button class="copy-btn" onclick="copyCmd(this)">Copy</button>${escapeHtml(cmd)}</div>`;
    });
  }
  if (note.body) {
    bodyHTML += `<hr class="section-divider">${note.body}`;
  }

  document.getElementById("nv-body").innerHTML = bodyHTML;

  // Add copy buttons to all cmd-blocks that don't have one
  document.querySelectorAll("#nv-body .cmd-block").forEach(block => {
    if (!block.querySelector(".copy-btn")) {
      const btn = document.createElement("button");
      btn.className = "copy-btn";
      btn.textContent = "Copy";
      btn.onclick = function() { copyCmd(this); };
      block.prepend(btn);
    }
  });

  // Related notes (same category/tags)
  const related = NOTES.filter(n =>
    n.id !== id && (n.category === note.category || n.tags.some(t => note.tags.includes(t)))
  ).slice(0, 5);

  if (related.length > 0) {
    const relEl = document.getElementById("nv-related");
    relEl.innerHTML = `<h3>Related Notes</h3><div class="related-items">${related.map(r =>
      `<div class="related-item" onclick="showNote(${r.id})">${r.title}</div>`
    ).join("")}</div>`;
    relEl.style.display = "block";
  } else {
    document.getElementById("nv-related").style.display = "none";
  }

  updateNavButtons();
  renderSidebar(document.getElementById("search-box").value);
  document.getElementById("main").scrollTop = 0;
}

function updateNavButtons() {
  const currentIdx = filteredNotes.findIndex(n => n.id === activeNoteId);
  const prevBtn = document.getElementById("prev-btn");
  const nextBtn = document.getElementById("next-btn");
  const counter = document.getElementById("nav-counter");

  prevBtn.disabled = currentIdx <= 0;
  nextBtn.disabled = currentIdx >= filteredNotes.length - 1;
  counter.textContent = `${currentIdx + 1} / ${filteredNotes.length}`;
}

function prevNote() {
  const currentIdx = filteredNotes.findIndex(n => n.id === activeNoteId);
  if (currentIdx > 0) showNote(filteredNotes[currentIdx - 1].id);
}

function nextNote() {
  const currentIdx = filteredNotes.findIndex(n => n.id === activeNoteId);
  if (currentIdx < filteredNotes.length - 1) showNote(filteredNotes[currentIdx + 1].id);
}

function showWelcome() {
  activeNoteId = null;
  document.getElementById("welcome").style.display = "block";
  document.getElementById("note-view").style.display = "none";
  renderSidebar();
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function copyCmd(btn) {
  const block = btn.parentElement;
  const text = block.textContent.replace("Copy", "").replace("Copied!", "").trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy", 1500);
  });
}

// Search
document.getElementById("search-box").addEventListener("input", function() {
  renderSidebar(this.value);
});

// Keyboard shortcuts
document.addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "k") {
    e.preventDefault();
    document.getElementById("search-box").focus();
  }
  if (e.key === "Escape") {
    document.getElementById("search-box").value = "";
    activeTag = null;
    renderTagCloud();
    showWelcome();
  }
  if (activeNoteId) {
    if (e.key === "ArrowLeft") prevNote();
    if (e.key === "ArrowRight") nextNote();
  }
});

function toggleTheme() {
  document.body.classList.toggle("light-theme");
  localStorage.setItem("cpts-theme", document.body.classList.contains("light-theme") ? "light" : "dark");
}

function exportAsJSON() {
  const data = { notes: NOTES, exportDate: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "cpts-notes.json";
  a.click();
}

function exportAsMarkdown() {
  let md = "# CPTS Knowledge Base\n\n";
  Object.keys(categories).forEach(cat => {
    md += `\n## ${cat}\n\n`;
    categories[cat].forEach(n => {
      md += `### ${n.title}\n\n`;
      if (n.description) md += `${n.description}\n\n`;
      if (n.commands.length > 0) {
        md += "**Commands:**\n\n";
        n.commands.forEach(cmd => md += `\`\`\`\n${cmd}\n\`\`\`\n\n`);
      }
      md += "---\n\n";
    });
  });
  const blob = new Blob([md], { type: "text/markdown" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "cpts-notes.md";
  a.click();
}

// Init
renderSidebar();
renderStatCards();
renderTagCloud();
</script>
</body>
</html>
